agent:
  max_recursion: 3
  max_iterations: 10
  poll_interval_seconds: 5
  workspace: "."
  state_dir: ".agent_memory"
  dry_run: false
  parallel_files: 4
  autonomy_level: level_1_local_patch

llm:
  # "swarm" routes planning/analysis to the NEWSUPERNOVA agent swarm over its
  # OpenAI-compatible API. base_url defaults to
  # https://supernova.onrender.com/api/external/v1 and model defaults to "abby"
  # (the orchestrator). Supply the swarm's OPENCLAW_API_KEY via
  # AGENT_LLM_API_KEY. With no key the backend fails closed and the runtime
  # falls back to a deterministic plan. Override via AGENT_LLM_BACKEND /
  # AGENT_LLM_BASE_URL / AGENT_LLM_MODEL.
  backend: swarm
  model: abby
  temperature: 0.1
  max_tokens: 4096
  timeout_seconds: 120
  retries: 3
  retry_backoff: 2.0
  max_context_chars: 80000
  api_key: null
  base_url: null

reviewer:
  enabled: true
  min_confidence: 0.6
  require_test_pass: true
  block_on_security: true

poller:
  file_patterns: ["**/*.py", "**/*.ts", "**/*.js", "**/*.tsx", "**/*.jsx", "**/*.go", "**/*.rs"]
  excluded_dirs:
    - ".agent_memory"
    - ".git"
    - "__pycache__"
    - ".venv"
    - "venv"
    - "node_modules"
    - ".pytest_cache"
    - "dist"
    - "build"
    - ".mypy_cache"
    - ".ruff_cache"
  max_file_size_bytes: 524288
  error_log_paths:
    - "errors.log"
    - "logs/error.log"

runner:
  python_command: ["python", "-m", "pytest", "-q", "--tb=short"]
  js_command: ["npm", "test", "--silent"]
  ts_command: ["npx", "tsc", "--noEmit"]
  timeout_seconds: 300
  sandbox: true

vcs:
  enabled: false
  auto_commit: false
  auto_push: false
  branch_prefix: "agent/fix"
  commit_signature: "autonomous-agent <agent@local>"
  open_pull_request: false
  github_repo: null
  github_token: null

security:
  redact_secrets: true
  forbidden_paths:
    - ".env"
    - "secrets/"
    - ".ssh/"
  max_patch_size_bytes: 65536
  allow_delete: false

memory:
  backend: sqlite
  retention_days: 30

logging:
  level: INFO
  format: json
  file: null

metrics:
  enabled: false
  port: 9090
