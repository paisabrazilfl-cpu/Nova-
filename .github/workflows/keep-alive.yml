name: Keep Alive

# Pings the live Fly.io app every 10 minutes so the machine never
# spins down to sleep. fly.toml already sets min_machines_running = 1 and
# auto_stop_machines = false, so this is a belt-and-suspenders warm ping.
# GitHub's scheduler enforces a 5-minute minimum and may delay runs under
# load, but 10 minutes keeps the app warm in practice.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    name: Ping live app
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping app
        run: |
          set -euo pipefail
          URL="https://snbm.fly.dev/"
          echo "Pinging $URL"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 --retry 3 --retry-delay 5 "$URL" || echo "000")
          echo "HTTP status: $code"
          # Any HTTP response (including 401/403/404) proves the machine is
          # awake; only treat connection failures / 5xx as a failure.
          if [ "$code" = "000" ] || [ "$code" -ge 500 ]; then
            echo "Keep-alive ping failed (status $code)"
            exit 1
          fi
          echo "App is awake (status $code)."
