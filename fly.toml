app = "snbm"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
OPENCLAW_CONFIG_PATH = "/data/openclaw.json"
NODE_OPTIONS = "--max-old-space-size=1536"

[processes]
app = "node dist/index.js gateway --port 3000 --bind lan"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

# Super Nova deep-worker HTTP API: job submit/poll for the chat UI.
# Same machine, separate daemon — reachable at https://snbm.fly.dev:8443.
[[services]]
internal_port = 8790
protocol = "tcp"
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

  [[services.ports]]
  port = 8443
  handlers = ["tls", "http"]

[[vm]]
size = "shared-cpu-2x"
memory = "2048mb"

[mounts]
source = "openclaw_data"
destination = "/data"
